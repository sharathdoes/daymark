definitions:
  category.createCategoryDTO:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  feedSource.CategoriesDTO:
    properties:
      categoryId:
        items:
          type: integer
        type: array
    type: object
  feedSource.CreateFeedDTO:
    properties:
      categoryIds:
        items:
          type: integer
        type: array
      name:
        type: string
      url:
        type: string
    type: object
  models.Category:
    properties:
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
    type: object
  models.FeedSource:
    properties:
      categories:
        items:
          $ref: '#/definitions/models.Category'
        type: array
      id:
        type: integer
      name:
        type: string
      url:
        type: string
    type: object
  quiz.CreateQuizDTO:
    properties:
      category_ids:
        items:
          type: integer
        type: array
      diffifculty:
        type: string
      number_of_questions:
        type: integer
    required:
    - diffifculty
    type: object
info:
  contact: {}
paths:
  /category/:
    get:
      description: Get all available categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Category'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List categories
      tags:
      - category
    post:
      consumes:
      - application/json
      description: Create a new category
      parameters:
      - description: Category payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/category.createCategoryDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create category
      tags:
      - category
  /category/{id}:
    get:
      description: Get a single category by its ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get category by ID
      tags:
      - category
  /feed/create:
    post:
      consumes:
      - application/json
      description: Create a new feed source with one or more category IDs
      parameters:
      - description: Feed payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/feedSource.CreateFeedDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create feed source
      tags:
      - feed
  /feed/ofCategories:
    get:
      consumes:
      - application/json
      description: Get feed sources that belong to any of the given category IDs
      parameters:
      - description: Category IDs
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/feedSource.CategoriesDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.FeedSource'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get feeds by category IDs
      tags:
      - feed
  /quiz/generate:
    post:
      consumes:
      - application/json
      description: Generate a quiz based on articles from the given categories
      parameters:
      - description: Quiz request
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/quiz.CreateQuizDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Generate quiz
      tags:
      - quiz
swagger: "2.0"
